{% extends 'base.html' %}
{% load static %}

{% block title %}Connexion - CouCou{% endblock %}

{% block content %}
<div class="auth-card">
    <div class="auth-header">
        <i class="fas fa-graduation-cap"></i>
        <h1>CouCou</h1>
        <p>Connectez-vous à votre espace scolaire</p>
    </div>

    <form method="post" action="{% url 'login' %}">
        {% csrf_token %}
        
        {% if form.errors %}
        <div class="alert alert-error">
            Identifiants incorrects. Veuillez réessayer.
        </div>
        {% endif %}

        <div class="form-group">
            <label for="id_username">Nom d'utilisateur</label>
            <input type="text" name="username" id="id_username" class="input-control" required placeholder="Entrez votre nom d'utilisateur">
        </div>

        <div class="form-group">
            <label for="id_password">Mot de passe</label>
            <input type="password" name="password" id="id_password" class="input-control" required placeholder="Entrez votre mot de passe">
        </div>

        <button type="submit" class="btn btn-primary btn-block">
            Se connecter <i class="fas fa-sign-in-alt"></i>
        </button>
    </form>

    <div style="margin-top: 2rem; text-align: center; color: var(--text-muted); font-size: 0.875rem;">
        <p>© 2026 CouCou</p>
    </div>
</div>
{% endblock %}
